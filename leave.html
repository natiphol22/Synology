<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลางาน | CubicPlus Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 10% 0%, hsla(228, 100%, 74%, 0.15) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189, 100%, 56%, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 0.1) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(240, 100%, 70%, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(22, 100%, 77%, 0.1) 0px, transparent 50%);
            min-height: 100vh;
            color: #334155;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,1);
            transition: all 0.3s ease;
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
            transition: all 0.2s ease;
        }
        .input-glass:focus-within {
            background: #fff;
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .fade-in-up { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .delay-100 { animation-delay: 0.1s; } .delay-200 { animation-delay: 0.2s; } .delay-300 { animation-delay: 0.3s; }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .swal2-popup { font-family: 'Kanit', sans-serif !important; border-radius: 1.5rem !important; background: rgba(255, 255, 255, 0.95) !important; backdrop-filter: blur(16px) !important; }

        /* Custom Dropdown */
        .custom-select-menu { display: none; opacity: 0; transform: translateY(-10px); transition: all 0.2s; }
        .custom-select-menu.open { display: block; opacity: 1; transform: translateY(0); }

        /* 🟢 Flatpickr CSS */
        .flatpickr-calendar {
            font-family: 'Kanit', sans-serif !important;
            border-radius: 1.5rem !important;
            border: none !important;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2) !important;
            padding: 10px !important;
            width: 320px !important;
        }
        .flatpickr-day.selected, .flatpickr-day.startRange, .flatpickr-day.endRange, .flatpickr-day.selected.inRange, .flatpickr-day.startRange.inRange, .flatpickr-day.endRange.inRange, .flatpickr-day.selected:focus, .flatpickr-day.startRange:focus, .flatpickr-day.endRange:focus, .flatpickr-day.selected:hover, .flatpickr-day.startRange:hover, .flatpickr-day.endRange:hover, .flatpickr-day.selected.prevMonthDay, .flatpickr-day.startRange.prevMonthDay, .flatpickr-day.endRange.prevMonthDay, .flatpickr-day.selected.nextMonthDay, .flatpickr-day.startRange.nextMonthDay, .flatpickr-day.endRange.nextMonthDay {
            background: #6366f1 !important;
            border-color: #6366f1 !important;
            font-weight: bold;
            border-radius: 50% !important;
        }
        .flatpickr-day.today { border-color: #cbd5e1 !important; border-radius: 50% !important;}
        .flatpickr-months .flatpickr-month { height: 45px !important; }
        .flatpickr-current-month { font-size: 110% !important; font-weight: bold !important; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12 selection:bg-primary-200 selection:text-primary-900">

    <!-- 🟢 Loader แบบเต็มจอเหมือน Admin -->
    <div id="loadingState" class="fixed inset-0 z-[999] bg-slate-50/90 backdrop-blur-sm flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="relative flex h-20 w-20 mb-6">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary-400 opacity-60"></span>
          <span class="relative inline-flex rounded-full h-20 w-20 bg-primary-600 flex items-center justify-center shadow-lg shadow-primary-500/30">
              <i data-lucide="calendar-clock" class="w-10 h-10 text-white animate-pulse"></i>
          </span>
        </div>
        <h2 class="text-xl font-bold text-slate-700">กำลังเตรียมข้อมูล</h2>
        <p class="text-slate-500 font-medium mt-1">Cubic<span class="text-primary-600">Plus</span> System</p>
    </div>

    <div class="max-w-[1200px] mx-auto flex justify-between items-center gap-4 mb-8 fade-in-up">
        <div class="flex-1">
            <h1 class="text-xl md:text-3xl font-bold text-slate-800 tracking-tight">ระบบลางาน</h1>
            <p class="text-slate-500 text-[11px] md:text-sm mt-0.5 md:mt-1 truncate">ข้อมูลวันลาของ: <span id="displayUser" class="font-semibold text-primary-600">กำลังโหลด...</span></p>
        </div>
        
        <a href="dashboard.html" class="w-10 h-10 md:w-auto md:px-5 md:py-2.5 bg-white border border-slate-200 rounded-full md:rounded-xl flex items-center justify-center gap-2 text-slate-500 hover:text-primary-600 hover:border-primary-200 transition-all shadow-sm shrink-0 group">
            <span class="hidden md:block font-bold text-sm">กลับหน้าหลัก</span>
            <i data-lucide="arrow-right" class="w-5 h-5 md:w-4 md:h-4 group-hover:translate-x-1 transition-transform"></i>
        </a>
    </div>

    <div class="max-w-[1200px] mx-auto">
        <div id="dataCards" class="grid grid-cols-3 gap-3 md:gap-4 mb-6 md:mb-8 hidden fade-in-up delay-100">
            <div class="glass-card p-3 md:p-4 rounded-[1.25rem] flex flex-col md:flex-row items-center md:justify-between text-center md:text-left group hover:bg-white transition-colors">
                <div class="flex items-center gap-3 mb-2 md:mb-0">
                    <div class="w-8 h-8 md:w-10 md:h-10 bg-blue-50 text-blue-500 rounded-[10px] md:rounded-xl flex items-center justify-center border border-blue-100 group-hover:scale-110 transition-transform">
                        <i data-lucide="thermometer" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </div>
                    <div class="hidden md:block">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wide">ลาป่วย</h3>
                        <p class="text-[10px] text-slate-400">คงเหลือ</p>
                    </div>
                </div>
                <div class="text-xl md:text-2xl font-black text-slate-800"><span id="sickDays">-</span><span class="text-[10px] md:text-xs font-medium text-slate-500 ml-1">วัน</span></div>
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wide md:hidden mt-1">ลาป่วย</h3>
            </div>
            <div class="glass-card p-3 md:p-4 rounded-[1.25rem] flex flex-col md:flex-row items-center md:justify-between text-center md:text-left group hover:bg-white transition-colors">
                <div class="flex items-center gap-3 mb-2 md:mb-0">
                    <div class="w-8 h-8 md:w-10 md:h-10 bg-amber-50 text-amber-500 rounded-[10px] md:rounded-xl flex items-center justify-center border border-amber-100 group-hover:scale-110 transition-transform">
                        <i data-lucide="briefcase" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </div>
                    <div class="hidden md:block">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wide">ลากิจ</h3>
                        <p class="text-[10px] text-slate-400">คงเหลือ</p>
                    </div>
                </div>
                <div class="text-xl md:text-2xl font-black text-slate-800"><span id="personalDays">-</span><span class="text-[10px] md:text-xs font-medium text-slate-500 ml-1">วัน</span></div>
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wide md:hidden mt-1">ลากิจ</h3>
            </div>
            <div class="glass-card p-3 md:p-4 rounded-[1.25rem] flex flex-col md:flex-row items-center md:justify-between text-center md:text-left group hover:bg-white transition-colors">
                <div class="flex items-center gap-3 mb-2 md:mb-0">
                    <div class="w-8 h-8 md:w-10 md:h-10 bg-emerald-50 text-emerald-500 rounded-[10px] md:rounded-xl flex items-center justify-center border border-emerald-100 group-hover:scale-110 transition-transform">
                        <i data-lucide="plane" class="w-4 h-4 md:w-5 md:h-5"></i>
                    </div>
                    <div class="hidden md:block">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wide">ลาพักร้อน</h3>
                        <p class="text-[10px] text-slate-400">คงเหลือ</p>
                    </div>
                </div>
                <div class="text-xl md:text-2xl font-black text-slate-800"><span id="annualDays">-</span><span class="text-[10px] md:text-xs font-medium text-slate-500 ml-1">วัน</span></div>
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wide md:hidden mt-1">พักร้อน</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8 hidden" id="mainContent">
            
            <div class="lg:col-span-7 glass-card rounded-[1.5rem] md:rounded-[2rem] p-5 md:p-8 fade-in-up delay-200 h-fit">
                <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-primary-50 flex items-center justify-center"><i data-lucide="file-edit" class="w-4 h-4 text-primary-600"></i></div>
                    ยื่นคำร้องขอลางาน
                </h2>
                
                <div class="space-y-5">
                    <div class="space-y-1.5 relative z-50">
                        <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1">ประเภทการลา</label>
                        <input type="hidden" id="leaveType" value="">
                        <div id="customSelectBtn" onclick="toggleSelect()" class="input-glass flex items-center px-4 py-3.5 rounded-xl cursor-pointer group">
                            <i data-lucide="tag" class="w-4 h-4 text-slate-400 group-hover:text-primary-500 transition-colors"></i>
                            <span id="customSelectText" class="ml-3 text-sm font-medium text-slate-400 select-none">คลิกเพื่อเลือกประเภท...</span>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 absolute right-4 transition-transform duration-200" id="customSelectIcon"></i>
                        </div>
                        
                        <div id="customSelectMenu" class="absolute w-full mt-1.5 bg-white rounded-xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] border border-slate-100 overflow-hidden custom-select-menu">
                            <div class="p-1.5">
                                <div onclick="selectOption('ลาป่วย')" class="px-4 py-3 hover:bg-blue-50 text-slate-700 hover:text-blue-600 rounded-lg cursor-pointer text-sm font-bold transition-colors flex items-center gap-3"><div class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-sm"></div> ลาป่วย</div>
                                <div onclick="selectOption('ลากิจ')" class="px-4 py-3 hover:bg-amber-50 text-slate-700 hover:text-amber-600 rounded-lg cursor-pointer text-sm font-bold transition-colors flex items-center gap-3"><div class="w-2.5 h-2.5 rounded-full bg-amber-500 shadow-sm"></div> ลากิจ</div>
                                <div onclick="selectOption('ลาพักร้อน')" class="px-4 py-3 hover:bg-emerald-50 text-slate-700 hover:text-emerald-600 rounded-lg cursor-pointer text-sm font-bold transition-colors flex items-center gap-3"><div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-sm"></div> ลาพักร้อน</div>
                                <div onclick="selectOption('อื่นๆ')" class="px-4 py-3 hover:bg-slate-50 text-slate-700 hover:text-slate-600 rounded-lg cursor-pointer text-sm font-bold transition-colors flex items-center gap-3"><div class="w-2.5 h-2.5 rounded-full bg-slate-400 shadow-sm"></div> อื่นๆ</div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 relative z-10">
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1">วันที่เริ่มลา</label>
                            <div class="input-glass flex items-center px-4 py-3 rounded-xl relative group">
                                <i data-lucide="calendar" class="w-4 h-4 text-slate-400 group-focus-within:text-primary-500 transition-colors"></i>
                                <input type="text" id="startDate" placeholder="เลือกวันที่..." class="w-full bg-transparent border-none outline-none ml-3 text-sm font-medium text-slate-700 placeholder:text-slate-400 cursor-pointer" readonly="readonly">
                            </div>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1">ถึงวันที่</label>
                            <div class="input-glass flex items-center px-4 py-3 rounded-xl relative group">
                                <i data-lucide="calendar-check" class="w-4 h-4 text-slate-400 group-focus-within:text-primary-500 transition-colors"></i>
                                <input type="text" id="endDate" placeholder="เลือกวันที่..." class="w-full bg-transparent border-none outline-none ml-3 text-sm font-medium text-slate-700 placeholder:text-slate-400 cursor-pointer" readonly="readonly">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-1.5 relative z-10">
                        <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1">เหตุผลการลา</label>
                        <div class="input-glass flex px-4 py-3.5 rounded-xl relative group">
                            <i data-lucide="align-left" class="w-4 h-4 text-slate-400 group-focus-within:text-primary-500 transition-colors mt-1"></i>
                            <textarea id="reason" rows="3" placeholder="โปรดระบุสาเหตุให้ชัดเจน..." class="w-full bg-transparent border-none outline-none ml-3 text-sm font-medium text-slate-700 placeholder:text-slate-400 placeholder:font-normal resize-none"></textarea>
                        </div>
                    </div>

                    <div class="pt-4 relative z-10">
                        <button id="submitBtn" onclick="submitLeave()" class="w-full py-4 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white rounded-xl font-bold text-sm shadow-[0_8px_15px_rgba(99,102,241,0.2)] hover:-translate-y-0.5 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <span id="btnText" class="flex items-center gap-2">ยืนยันการลางาน <i data-lucide="send" class="w-4 h-4"></i></span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 glass-card rounded-[1.5rem] md:rounded-[2rem] p-5 md:p-8 flex flex-col h-full max-h-[600px] fade-in-up delay-300">
                <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-4">
                    <h2 class="text-base md:text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="history" class="w-5 h-5 text-slate-400"></i> ประวัติของคุณ
                    </h2>
                    <button onclick="loadLeaveData()" class="text-slate-400 hover:text-primary-600 transition-colors p-1"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                </div>
                
                <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-3 max-h-[350px] md:max-h-[420px]" id="historyContainer">
                    <div class="text-center py-10 text-slate-400 text-sm">กำลังโหลดประวัติ...</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby1M8mcf1Oxqc3mmGPReX6LG4J-Xas0vHLmqu9_HnRbVBfBA0DF09Pew5atLx-aArjD/exec"; 

        const isLoggedIn = sessionStorage.getItem("isLoggedIn");
        const username = sessionStorage.getItem("userLoginName");
        const name = sessionStorage.getItem("userName");

        let endDatePicker;
        
        const startDatePicker = flatpickr("#startDate", {
            locale: "th",
            dateFormat: "Y-m-d", 
            altInput: true,
            altFormat: "d M Y", 
            disableMobile: true,
            onChange: function(selectedDates, dateStr, instance) {
                endDatePicker.set('minDate', dateStr);
            }
        });

        endDatePicker = flatpickr("#endDate", {
            locale: "th",
            dateFormat: "Y-m-d",
            altInput: true,
            altFormat: "d M Y",
            disableMobile: true
        });

        function toggleSelect() {
            const menu = document.getElementById('customSelectMenu');
            const icon = document.getElementById('customSelectIcon');
            if(menu.classList.contains('open')) {
                menu.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
            } else {
                menu.classList.add('open');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function selectOption(value) {
            document.getElementById('leaveType').value = value;
            const textSpan = document.getElementById('customSelectText');
            textSpan.innerText = value;
            textSpan.classList.remove('text-slate-400');
            textSpan.classList.add('text-slate-800');
            toggleSelect();
        }

        document.addEventListener('click', function(event) {
            const btn = document.getElementById('customSelectBtn');
            const menu = document.getElementById('customSelectMenu');
            if (btn && menu && !btn.contains(event.target) && !menu.contains(event.target)) {
                menu.classList.remove('open');
                document.getElementById('customSelectIcon').style.transform = 'rotate(0deg)';
            }
        });

        function formatThaiDate(dateString) {
            if(!dateString) return "-";
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString; 
                return d.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
            } catch(e) { return dateString; }
        }

        window.onload = async function() {
            lucide.createIcons();
            if (isLoggedIn !== "true" || !username) { window.location.href = "index.html"; return; }
            document.getElementById("displayUser").innerText = `${name || 'ผู้ใช้งาน'} (${username})`;
            await loadLeaveData();
        };

        async function loadLeaveData() {
            document.getElementById("loadingState").classList.remove("hidden");
            document.getElementById("dataCards").classList.add("hidden");
            document.getElementById("mainContent").classList.add("hidden");
            document.getElementById("historyContainer").innerHTML = '<div class="text-center py-10 text-slate-400 text-sm"><i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto mb-2 text-primary-400"></i>กำลังดึงข้อมูล...</div>';
            lucide.createIcons();

            try {
                const balPromise = fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "getLeaveBalance", username: username }) }).then(res => res.json());
                const histPromise = fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: "adminFetchLeaveRequests" }) }).then(res => res.json());

                const [balResult, histResult] = await Promise.all([balPromise, histPromise]);

                if (balResult.status === "success") {
                    document.getElementById("sickDays").innerText = balResult.sick || 0;
                    document.getElementById("personalDays").innerText = balResult.personal || 0;
                    document.getElementById("annualDays").innerText = balResult.annual || 0;
                } else {
                    document.getElementById("sickDays").innerText = "0";
                    document.getElementById("personalDays").innerText = "0";
                    document.getElementById("annualDays").innerText = "0";
                }

                const myHistory = (histResult.data || []).filter(req => req.Username === username);
                renderHistory(myHistory);

                document.getElementById("loadingState").classList.add("hidden");
                document.getElementById("dataCards").classList.remove("hidden");
                document.getElementById("mainContent").classList.remove("hidden");
                lucide.createIcons();
            } catch (error) {
                document.getElementById("loadingState").innerHTML = '<p class="text-rose-500 font-medium text-sm">เกิดข้อผิดพลาดในการเชื่อมต่อข้อมูล</p>';
            }
        }

        function renderHistory(historyData) {
            const container = document.getElementById("historyContainer");
            if (historyData.length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-slate-400 text-sm bg-slate-50/50 rounded-xl border border-slate-100 border-dashed">ยังไม่มีประวัติการยื่นลางาน</div>';
                return;
            }

            let html = "";
            historyData.forEach(req => {
                const sDate = formatThaiDate(req.StartDate);
                const eDate = formatThaiDate(req.EndDate);
                
                let statusClass = "bg-amber-50 text-amber-600 border-amber-100"; 
                if (req.Status === "อนุมัติ") statusClass = "bg-emerald-50 text-emerald-600 border-emerald-100";
                if (req.Status.includes("ไม่อนุมัติ") || req.Status.includes("ยกเลิก")) statusClass = "bg-rose-50 text-rose-600 border-rose-100";

                let typeColor = "text-primary-600";
                if (req.LeaveType === "ลาป่วย") typeColor = "text-blue-500";
                else if (req.LeaveType === "ลากิจ") typeColor = "text-amber-500";
                else if (req.LeaveType === "ลาพักร้อน") typeColor = "text-emerald-500";

                const cancelBtnHTML = req.Status === "รออนุมัติ" ? `
                    <button onclick="cancelLeave('${req.Timestamp}')" class="text-rose-400 hover:text-rose-600 hover:bg-rose-50 p-1.5 rounded-lg transition-colors ml-2" title="ยกเลิกคำร้องนี้">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                ` : '';

                html += `
                    <div class="p-3.5 md:p-4 border border-slate-100 bg-white/60 rounded-xl hover:bg-white hover:shadow-sm transition-all group relative">
                        <div class="flex justify-between items-start mb-2.5">
                            <div class="font-bold text-[13px] md:text-sm ${typeColor}">${req.LeaveType}</div>
                            <div class="flex items-center">
                                <span class="px-2 py-0.5 rounded text-[10px] font-bold border ${statusClass}">${req.Status}</span>
                                ${cancelBtnHTML}
                            </div>
                        </div>
                        <div class="text-[11px] md:text-xs text-slate-500 mb-1.5 flex items-center gap-1.5"><i data-lucide="calendar" class="w-3 h-3 text-slate-400"></i> ${sDate} - ${eDate}</div>
                        <div class="text-[11px] md:text-xs text-slate-400 truncate w-full flex items-center gap-1.5" title="${req.Reason}"><i data-lucide="align-left" class="w-3 h-3 text-slate-300"></i> ${req.Reason}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function cancelLeave(timestamp) {
            Swal.fire({
                title: 'ต้องการยกเลิกคำร้องนี้?',
                text: "หากยกเลิกแล้ว คำร้องนี้จะถูกนำออกจากสถานะรออนุมัติทันที",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ใช่, ยกเลิกคำร้อง',
                cancelButtonText: 'ปิด'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        Swal.fire({ title: 'กำลังดำเนินการ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                        const payload = { action: "cancelLeave", username: username, timestamp: timestamp };
                        const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                        const res = await response.json();

                        if(res.status === "success") {
                            Swal.fire('สำเร็จ', 'ยกเลิกคำร้องเรียบร้อยแล้ว', 'success');
                            loadLeaveData(); 
                        } else {
                            Swal.fire('ล้มเหลว', res.message || 'ไม่สามารถยกเลิกคำร้องได้', 'error');
                        }
                    } catch (error) {
                        Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
                    }
                }
            });
        }

        async function submitLeave() {
            const leaveType = document.getElementById("leaveType").value;
            const startDate = document.getElementById("startDate").value;
            const endDate = document.getElementById("endDate").value;
            const reason = document.getElementById("reason").value.trim();

            if (!leaveType || !startDate || !endDate || !reason) {
                Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบถ้วน', text: 'กรุณากรอกและเลือกข้อมูลให้ครบทุกช่อง', confirmButtonColor: '#6366f1' });
                return;
            }

            const btn = document.getElementById("submitBtn");
            const btnText = document.getElementById("btnText");

            btn.disabled = true;
            btnText.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> กำลังส่งข้อมูล...';
            lucide.createIcons();

            const payload = {
                action: "submitLeave", username: username, name: name,
                leaveType: leaveType, startDate: startDate, endDate: endDate, reason: reason
            };

            try {
                const response = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();

                if (result.status === "success") {
                    Swal.fire({
                        icon: 'success', title: 'ส่งคำร้องสำเร็จ', text: 'ระบบได้บันทึกคำร้องขอลางานของคุณแล้ว', confirmButtonColor: '#10b981'
                    }).then(() => {
                        document.getElementById("leaveType").value = "";
                        document.getElementById("customSelectText").innerText = "คลิกเพื่อเลือกประเภท...";
                        document.getElementById("customSelectText").classList.replace('text-slate-800', 'text-slate-400');
                        startDatePicker.clear(); 
                        endDatePicker.clear();   
                        document.getElementById("reason").value = "";
                        loadLeaveData(); 
                    });
                } else { throw new Error("เกิดข้อผิดพลาดจากเซิร์ฟเวอร์"); }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'ส่งคำร้องไม่สำเร็จ', text: 'ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่อีกครั้ง', confirmButtonColor: '#ef4444' });
            } finally {
                btn.disabled = false;
                btnText.innerHTML = 'ยืนยันการลางาน <i data-lucide="send" class="w-4 h-4"></i>';
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
