<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Synology Support - AI Smart Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a2e; --panel: #16213e; --text: #e9ecef;
            --user-bubble: #0f3460; --bot-bubble: #22252a;
            --accent: #e94560; --success: #10b981; --input-bg: rgba(255, 255, 255, 0.05);
            --ai-glow: #00f2fe;
        }
        body.light {
            --bg: #f0f2f5; --panel: #ffffff; --text: #1c1e21;
            --user-bubble: #0084ff; --bot-bubble: #e4e6eb; --accent: #007bff; --input-bg: #f8f9fa;
            --ai-glow: #007bff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; overflow: hidden; height: 100vh; }
        
        .app { max-width: 900px; margin: auto; height: 100vh; display: flex; flex-direction: column; position: relative; }
        
        /* Header ปรับปรุงให้ยืดหยุ่น */
        .header { 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--panel); 
            box-shadow: 0 2px 15px rgba(0,0,0,0.15); 
            z-index: 100; 
            flex-shrink: 0;
            gap: 5px;
        }
        .header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
        .header-left span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .header-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

        /* AI Switch */
        .ai-switch { position: relative; width: 60px; height: 30px; cursor: pointer; flex-shrink: 0; }
        .ai-switch input { opacity: 0; width: 0; height: 0; }
        .ai-slider { 
            position: absolute; inset: 0; background: #333; transition: .4s; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center;
        }
        .ai-slider:after {
            content: "OFF"; position: absolute; right: 8px; font-size: 9px; font-weight: bold; color: #888; transition: .4s;
        }
        .ai-slider:before { 
            position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 3px; 
            background: white; transition: .4s; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.3); z-index: 2;
        }
        input:checked + .ai-slider { background: var(--ai-glow); box-shadow: 0 0 10px var(--ai-glow); }
        input:checked + .ai-slider:after { content: "AI"; left: 8px; color: white; }
        input:checked + .ai-slider:before { transform: translateX(30px); }

        .btn-icon { background: var(--input-bg); border: none; border-radius: 10px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }

        /* Chat */
        .chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .row { display: flex; width: 100%; opacity: 0; transform: translateY(10px); animation: appear 0.4s forwards; }
        .row.user { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; position: relative; box-shadow: 0 3px 10px rgba(0,0,0,0.05); word-wrap: break-word; }
        .user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
        .bot .bubble { background: var(--bot-bubble); border-bottom-left-radius: 4px; border: 1px solid rgba(128,128,128,0.1); }
        @keyframes appear { to { opacity: 1; transform: translateY(0); } }

        /* --- ปรับปรุงส่วน Input Area ให้บาลานซ์บนมือถือ --- */
        .input-area { 
            padding: 10px 15px 25px; 
            flex-shrink: 0; 
            background: var(--bg);
        }
        .input-box { 
            display: flex; 
            background: var(--panel); 
            padding: 6px 10px; 
            border-radius: 35px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            align-items: center; 
            border: 1px solid rgba(128,128,128,0.1);
            width: 100%;
        }
        .faq-trigger {
            background: none; 
            border: none; 
            font-size: 1.3rem; 
            cursor: pointer; 
            padding: 0 8px; 
            flex-shrink: 0; 
            display: flex;
            align-items: center;
        }
        input#input { 
            flex: 1; 
            min-width: 0; /* ป้องกัน Input ดัน flex container */
            border: none; 
            outline: none; 
            padding: 10px 5px; 
            background: transparent; 
            color: var(--text); 
            font-size: 16px; /* ป้องกัน iOS ซูม */
        }
        .btn-send { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: 500; 
            transition: 0.3s; 
            flex-shrink: 0; 
            margin-left: 5px;
        }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: flex-end; z-index: 1000; backdrop-filter: blur(8px); }
        .modal.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-content { background: var(--panel); padding: 20px; border-radius: 25px 25px 0 0; width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 12px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 12px; right: 15px; background: var(--input-bg); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; z-index: 10; }

        .tab-container { display: flex; background: var(--input-bg); padding: 4px; border-radius: 15px; gap: 4px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
        .tab-btn { flex: 1; padding: 10px 15px; border: none; border-radius: 12px; cursor: pointer; background: transparent; color: var(--text); transition: 0.3s; font-size: 0.85rem; white-space: nowrap; }
        .tab-btn.active { background: var(--panel); box-shadow: 0 3px 8px rgba(0,0,0,0.15); border: 1px solid rgba(128,128,128,0.1); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tool-input, .tool-select, .tool-textarea { background: var(--input-bg); border-radius: 12px; border: 1px solid rgba(128,128,128,0.1); color: var(--text); padding: 12px; font-family: inherit; font-size: 0.95rem; outline: none; width: 100%; }
        .full-width { grid-column: span 2; }
        
        .faq-list { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .faq-item { background: var(--input-bg); padding: 12px 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; font-size: 0.9rem; }
        .faq-item:hover { border-color: var(--accent); }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .bubble { max-width: 92%; }
            .header-left span { font-size: 0.95rem; }
        }

        .typing-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; display: inline-block; animation: blink 1.4s infinite; margin: 0 2px; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
    </style>
</head>
<body class="light">

<div class="app">
    <div class="header">
        <div class="header-left">
            <span style="font-size: 1.2rem;">🤖</span>
            <span style="font-weight: 500;">Synology Support</span>
        </div>
        <div class="header-right">
            <label class="ai-switch">
                <input type="checkbox" id="aiMode">
                <span class="ai-slider"></span>
            </label>
            <button class="btn-icon" onclick="openTool()">📋</button>
            <button class="btn-icon" onclick="toggleTheme()">🌓</button>
            <button class="btn-icon" onclick="openLogin()">⚙️</button>
        </div>
    </div>

    <div class="chat" id="chat"></div>
    <div id="typing-ui" style="display:none; padding: 0 25px 10px;"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>

    <div class="input-area">
        <div class="input-box">
            <button class="faq-trigger" onclick="openFAQ()" type="button">❓</button>
            <input id="input" placeholder="พิมพ์ถามได้เลย..." autocomplete="off">
            <button class="btn-send" onclick="send()" type="button">ส่ง</button>
        </div>
    </div>
</div>

<div class="modal" id="faqModal">
    <div class="modal-content">
        <button onclick="closeModal('faqModal')" class="close-btn">✕</button>
        <h3 style="margin:0; font-size:1.1rem;">💡 คำถามที่พบบ่อย</h3>
        <input type="text" id="faqSearchInput" placeholder="🔍 ค้นหาคำถาม..." class="tool-input" onkeyup="filterFAQByText()">
        <div class="tab-container" id="faqTabContainer">
            <button class="tab-btn active" onclick="filterFAQ('All', this)">ทั้งหมด</button>
            <button class="tab-btn" onclick="filterFAQ('General', this)">General</button>
            <button class="tab-btn" onclick="filterFAQ('Hardware', this)">Hardware</button>
            <button class="tab-btn" onclick="filterFAQ('Software', this)">Software</button>
        </div>
        <div class="faq-list" id="faqList"></div>
    </div>
</div>

<div class="modal" id="toolModal">
    <div class="modal-content">
        <button onclick="closeModal('toolModal')" class="close-btn">✕</button>
        <h3 style="margin:0; text-align:center; font-size:1.1rem;">📋 เครื่องมือช่วยพิมพ์</h3>
        <div class="tab-container">
            <button class="tab-btn active" id="toolTab1" onclick="switchToolTab(1)">🔍 เช็คประกัน</button>
            <button class="tab-btn" id="toolTab2" onclick="switchToolTab(2)">🛠️ แจ้งเคลม</button>
        </div>
        <div id="formWarranty" class="form-grid">
            <input id="wModel" placeholder="รุ่น (Model)" class="tool-input tool-enter">
            <input id="wSN" placeholder="Serial Number" class="tool-input tool-enter">
            <a href="https://legacy.sisthai.com/sl.php?l=serial" target="_blank" class="tool-input full-width" style="text-align:center; text-decoration:none; background: #007bff; color:white; border:none; font-size:0.85rem;">🌐 เปิดเว็บเช็ค S/N SiS</a>
        </div>
        <div id="formClaim" class="form-grid" style="display:none;">
            <select id="cType" class="tool-select full-width">
                <option value="Synology NAS">Synology NAS</option>
                <option value="HDD/SSD">HDD / SSD</option>
            </select>
            <input id="cModel" placeholder="รุ่นสินค้า" class="tool-input tool-enter">
            <input id="cSN" placeholder="Serial Number" class="tool-input tool-enter">
            <input id="cTicker" placeholder="เลข Ticket ID" class="tool-input full-width tool-enter">
            <textarea id="cSymptom" placeholder="อาการเสีย..." class="tool-textarea full-width" rows="2"></textarea>
        </div>
        <button onclick="generateText()" class="btn-send" style="padding:12px; border-radius:15px; margin-top:10px;">สร้างข้อความ</button>
        <div id="resultBox" style="display:none; background:var(--input-bg); padding:12px; border-radius:12px; border:1px dashed var(--accent); white-space:pre-line; font-size:0.85rem; margin-top:10px;"></div>
        <button id="copyBtn" onclick="copyResult()" class="btn-send" style="display:none; background:var(--success); margin-top:10px; width:100%;">📋 คัดลอก</button>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-content" style="max-width:350px; margin: auto; border-radius:20px;">
        <h3 style="text-align:center; margin-top:0;">Admin Login</h3>
        <input type="password" id="password" placeholder="รหัสผ่าน" class="tool-input" style="text-align:center;">
        <button onclick="checkPassword()" class="btn-send" style="margin-top:5px; width:100%;">ตกลง</button>
        <button onclick="closeModal('loginModal')" style="background:none; border:none; color:var(--text); cursor:pointer; margin-top:5px; font-size:0.8rem;">ยกเลิก</button>
    </div>
</div>

<div class="modal" id="dataModal">
    <div class="modal-content">
        <button onclick="closeModal('dataModal')" class="close-btn">✕</button>
        <h3 style="margin:0; color:var(--accent); font-size:1.1rem;">⚙️ ตั้งค่าระบบ</h3>
        <input type="password" id="settingGroqKey" placeholder="Groq API Key (gsk_...)" class="tool-input full-width">
        <button onclick="saveSettings()" class="btn-send" style="background:var(--user-bubble);">💾 บันทึก Key</button>
        <hr style="width:100%; border:0; border-top:1px solid rgba(128,128,128,0.2); margin:5px 0;">
        <div class="form-grid">
            <select id="dataType" class="tool-select full-width">
                <option>General</option><option>Hardware</option><option>Software</option>
            </select>
            <input id="dataKeyword" placeholder="Keywords (คั่นด้วย ,)" class="tool-input full-width data-enter">
            <textarea id="dataAnswer" placeholder="คำตอบ..." class="tool-textarea full-width data-enter" rows="2"></textarea>
            <input id="dataManual" placeholder="Link คู่มือ / รูป" class="tool-input full-width data-enter">
            <label style="display:flex; align-items:center; gap:8px; font-size:0.85rem;">
                <input type="checkbox" id="dataIsFaq"> แสดงในหน้า FAQ
            </label>
        </div>
        <button id="addBtn" onclick="addData()" class="btn-send" style="background:var(--success);">💾 บันทึกข้อมูล</button>
    </div>
</div>

<script>
    const API = "https://api.sheetbest.com/sheets/4ba98472-2b00-48a2-9f2d-fd4104ad8589";
    const PASS = "synology123";
    let GROQ_KEY = localStorage.getItem("stored_groq_key") || "";
    let cachedData = [];
    let currentFAQFilter = 'All';
    let currentToolTab = 1;

    // Chat Logic
    async function send() {
        const inputEl = document.getElementById("input");
        const q = inputEl.value.trim();
        if (!q || document.getElementById("typing-ui").style.display === "block") return;
        
        addMessage(q, "user");
        inputEl.value = "";
        document.getElementById("typing-ui").style.display = "block";

        try {
            const res = await fetch(API);
            const data = await res.json();
            const match = findBest(q, data);
            
            if (match) {
                hideTyping();
                renderResponse(match);
            } else if (document.getElementById("aiMode").checked && GROQ_KEY) {
                await askGroq(q);
            } else {
                hideTyping();
                typeWriter(addMessage("", "bot"), "ไม่พบข้อมูลครับ ลองเปิดโหมด AI หรือดู FAQ นะครับ");
            }
        } catch { 
            hideTyping(); 
            addMessage("การเชื่อมต่อฐานข้อมูลผิดพลาด", "bot"); 
        }
    }

    async function askGroq(q) {
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [{ role: "system", content: "คุณคือผู้เชี่ยวชาญ Synology NAS ตอบเป็นภาษาไทยสุภาพและกระชับ" }, { role: "user", content: q }],
                    model: "llama-3.3-70b-versatile"
                })
            });
            const result = await res.json();
            hideTyping();
            typeWriter(addMessage("", "bot"), "✨ [AI]: " + (result.choices?.[0].message.content || "AI ไม่พร้อมใช้งาน"));
        } catch { hideTyping(); addMessage("AI ขัดข้องชั่วคราว", "bot"); }
    }

    function addMessage(text, side) {
        const row = document.createElement("div");
        row.className = `row ${side}`;
        row.innerHTML = `<div class="bubble">${text}</div>`;
        const chat = document.getElementById("chat");
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
        return row.querySelector(".bubble");
    }

    function typeWriter(el, text) {
        let i = 0; const speed = 15;
        const formatted = text.replace(/\n/g, "<br>");
        function type() {
            if (i < formatted.length) {
                if (formatted.substr(i, 4) === "<br>") { el.innerHTML += "<br>"; i += 4; }
                else { el.innerHTML += formatted.charAt(i); i++; }
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
                setTimeout(type, speed);
            }
        }
        type();
    }

    function renderResponse(item) {
        const b = addMessage("", "bot");
        typeWriter(b, item.Answer);
        if (item.ManualURL) {
            setTimeout(() => {
                const isImg = /\.(jpg|jpeg|png|webp|gif)$/.test(item.ManualURL.toLowerCase());
                b.innerHTML += isImg ? `<br><img src="${item.ManualURL}" style="width:100%; border-radius:15px; margin-top:10px;">` : `<br><a href="${item.ManualURL}" target="_blank" style="color:var(--accent); font-weight:500;">📘 ดูเพิ่มเติม...</a>`;
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }, item.Answer.length * 15 + 300);
        }
    }

    function findBest(q, data) {
        let best = null; let maxScore = 0;
        const cleanQ = q.toLowerCase();
        data.forEach(item => {
            if (!item.Keyword) return;
            item.Keyword.toLowerCase().split(",").forEach(kw => {
                const cleanKw = kw.trim();
                if (cleanQ === cleanKw) { maxScore = 1000; best = item; }
                else if (cleanQ.includes(cleanKw) && cleanKw.length > 2) {
                    let s = cleanKw.length * 5;
                    if (s > maxScore) { maxScore = s; best = item; }
                }
            });
        });
        return maxScore > 0 ? best : null;
    }

    // Modal & FAQ Logic
    function openFAQ() {
        document.getElementById("faqModal").classList.add("active");
        fetch(API).then(r => r.json()).then(data => { cachedData = data; renderFAQ(); });
    }
    function renderFAQ() {
        const list = document.getElementById("faqList");
        list.innerHTML = "";
        const filtered = cachedData.filter(i => {
            const isF = (i.isFAQ == "TRUE" || i.isFAQ == true || i.isFAQ == "1");
            return isF && (currentFAQFilter === 'All' || i.Type === currentFAQFilter);
        });
        filtered.forEach(item => {
            const d = document.createElement("div");
            d.className = "faq-item";
            d.innerText = "❓ " + item.Keyword.split(",")[0];
            d.onclick = () => { 
                document.getElementById("input").value = item.Keyword.split(",")[0]; 
                closeModal('faqModal'); 
                send(); 
            };
            list.appendChild(d);
        });
    }
    function filterFAQ(type, btn) {
        currentFAQFilter = type;
        document.querySelectorAll("#faqTabContainer .tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderFAQ();
    }
    function filterFAQByText() {
        const val = document.getElementById("faqSearchInput").value.toLowerCase();
        document.querySelectorAll(".faq-item").forEach(el => {
            el.style.display = el.innerText.toLowerCase().includes(val) ? "block" : "none";
        });
    }

    // Tools Logic
    function openTool() { document.getElementById("toolModal").classList.add("active"); }
    function switchToolTab(n) {
        currentToolTab = n;
        document.getElementById("toolTab1").className = n === 1 ? "tab-btn active" : "tab-btn";
        document.getElementById("toolTab2").className = n === 2 ? "tab-btn active" : "tab-btn";
        document.getElementById("formWarranty").style.display = n === 1 ? "grid" : "none";
        document.getElementById("formClaim").style.display = n === 2 ? "grid" : "none";
    }
    function generateText() {
        let txt = "";
        if (currentToolTab === 1) {
            const m = document.getElementById("wModel").value || "...";
            const s = document.getElementById("wSN").value || "...";
            txt = `เรียนทีม Service SIS\n\nรบกวนเช็คประกันสินค้า\nModel: ${m}\nS/N: ${s}\n\nขอบคุณครับ`;
        } else {
            const m = document.getElementById("cModel").value || "...";
            const s = document.getElementById("cSN").value || "...";
            const sy = document.getElementById("cSymptom").value || "...";
            txt = `เรียนทีม Service SIS\n\nแจ้งเคลมสินค้า ${document.getElementById("cType").value}\nModel: ${m}\nS/N: ${s}\nTicket ID: ${document.getElementById("cTicker").value || "-"}\n\nอาการ:\n${sy}\n\nขอบคุณครับ`;
        }
        const resBox = document.getElementById("resultBox");
        resBox.innerText = txt;
        resBox.style.display = "block";
        document.getElementById("copyBtn").style.display = "block";
    }
    function copyResult() {
        navigator.clipboard.writeText(document.getElementById("resultBox").innerText);
        alert("คัดลอกลง Clipboard แล้ว");
    }

    // Admin Settings
    function openLogin() { document.getElementById("loginModal").classList.add("active"); }
    function checkPassword() {
        if(document.getElementById("password").value === PASS) {
            closeModal('loginModal'); 
            document.getElementById("dataModal").classList.add("active");
            document.getElementById("settingGroqKey").value = GROQ_KEY;
            document.getElementById("password").value = "";
        } else alert("รหัสผ่านไม่ถูกต้อง");
    }
    function saveSettings() {
        GROQ_KEY = document.getElementById("settingGroqKey").value;
        localStorage.setItem("stored_groq_key", GROQ_KEY);
        alert("บันทึก API Key สำเร็จ");
    }
    async function addData() {
        const btn = document.getElementById("addBtn");
        const kw = document.getElementById("dataKeyword").value;
        const ans = document.getElementById("dataAnswer").value;
        if(!kw || !ans) return alert("กรุณากรอกข้อมูล Keyword และคำตอบ");
        
        btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
        try {
            await fetch(API, {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify([{
                    Type: document.getElementById("dataType").value,
                    Keyword: kw, 
                    Answer: ans, 
                    ManualURL: document.getElementById("dataManual").value,
                    isFAQ: document.getElementById("dataIsFaq").checked ? "TRUE" : "FALSE"
                }])
            });
            alert("บันทึกข้อมูลสำเร็จ!"); 
            closeModal('dataModal');
        } catch { alert("เกิดข้อผิดพลาดในการบันทึก"); }
        finally { btn.innerText = "💾 บันทึกข้อมูล"; btn.disabled = false; }
    }

    // UI Helpers
    function closeModal(id) { document.getElementById(id).classList.remove("active"); }
    function toggleTheme() { document.body.classList.toggle("light"); }
    function hideTyping() { document.getElementById("typing-ui").style.display = "none"; }

    // Keyboard Shortcuts
    document.addEventListener("keydown", e => {
        if (e.key === "Escape") document.querySelectorAll(".modal").forEach(m => m.classList.remove("active"));
        if (e.key === "Enter") {
            const activeId = document.activeElement.id;
            if (activeId === "input") send();
            if (activeId === "password") checkPassword();
            if (document.activeElement.classList.contains("tool-enter")) generateText();
            if (document.activeElement.classList.contains("data-enter")) addData();
        }
    });

    window.onload = () => {
        typeWriter(addMessage("", "bot"), "สวัสดีครับ ยินดีต้อนรับสู่ Synology Support\nเลือกดูคำถาม ❓ หรือพิมพ์สิ่งที่ต้องการทราบได้เลยครับ");
    };
</script>
</body>
</html>
