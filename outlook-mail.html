<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook | CubicPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden">
    <header class="h-14 bg-white border-b flex items-center px-4 justify-between shrink-0">
        <div class="flex items-center gap-3">
            <a href="dashboard.html" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                <i data-lucide="arrow-left" class="w-5 h-5 text-slate-600"></i>
            </a>
            <span class="font-bold text-slate-700">Outlook Mail</span>
        </div>
        <a href="https://outlook.cloud.microsoft/mail/" target="_blank" class="text-xs text-primary-600 font-bold flex items-center gap-1">
            <i data-lucide="external-link" class="w-3 h-3"></i> เปิดในหน้าต่างใหม่
        </a>
    </header>

    <div class="flex-1 w-full h-full bg-slate-50 flex items-center justify-center relative">
        <iframe src="https://outlook.cloud.microsoft/mail/" class="w-full h-full border-none z-10"></iframe>
        
        <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
            <i data-lucide="shield-alert" class="w-12 h-12 text-slate-300 mb-4"></i>
            <h2 class="text-slate-800 font-bold">การรักษาความปลอดภัยของ Outlook</h2>
            <p class="text-sm text-slate-500 mt-2 max-w-xs">หากหน้าเว็บไม่แสดงผลเนื่องจากนโยบายความปลอดภัย กรุณากดปุ่มด้านล่างเพื่อเข้าสู่ระบบ</p>
            <a href="https://outlook.cloud.microsoft/mail/" target="_blank" class="mt-4 px-6 py-2 bg-[#0078d4] text-white rounded-lg font-bold shadow-lg">เข้าสู่ Outlook</a>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
